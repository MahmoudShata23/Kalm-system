services:
  postgres:
    image: postgres:18.4@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
    container_name: kalm-postgres
    environment:
      POSTGRES_DB: kalm
      POSTGRES_USER: kalm
      POSTGRES_PASSWORD: kalm_dev_password
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalm -d kalm"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - kalm_postgres_data:/var/lib/postgresql

volumes:
  kalm_postgres_data:
