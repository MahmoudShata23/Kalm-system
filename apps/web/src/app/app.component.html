<div class="shell" [attr.dir]="viewModel().direction" [attr.lang]="viewModel().language">
  <header class="topbar">
    <span class="brand">{{ viewModel().copy.brand }}</span>
    <span class="spacer"></span>
    <span class="status">{{ viewModel().isAuthenticated ? viewModel().copy.sessionAuthenticated : viewModel().copy.sessionState }}</span>
    <nav class="language-toggle" [attr.aria-label]="viewModel().copy.languageToggleLabel">
      <p-button label="EN" [text]="true" ariaLabel="EN — English" [class.active]="viewModel().language === 'en'" (onClick)="setLanguage('en')" />
      <p-button label="AR" [text]="true" ariaLabel="AR — العربية" [class.active]="viewModel().language === 'ar'" (onClick)="setLanguage('ar')" />
    </nav>
  </header>
  <main class="content">
    <router-outlet />
  </main>
</div>
