name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: kalm
          POSTGRES_USER: kalm
          POSTGRES_PASSWORD: kalm_dev_password
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U kalm -d kalm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302
      - name: Restore
        run: dotnet restore Kalm.slnx
      - name: Format
        run: dotnet format Kalm.slnx --verify-no-changes --no-restore
      - name: Build
        run: dotnet build Kalm.slnx --configuration Release --no-restore -m:1
      - name: Unit tests
        run: dotnet test tests/Unit/Kalm.UnitTests/Kalm.UnitTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
      - name: Architecture tests
        run: dotnet test tests/Architecture/Kalm.ArchitectureTests/Kalm.ArchitectureTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
      - name: Integration tests
        run: dotnet test tests/Integration/Kalm.Api.IntegrationTests/Kalm.Api.IntegrationTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: E2E smoke
        run: npm run e2e
