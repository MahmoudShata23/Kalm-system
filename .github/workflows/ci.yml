name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
        env:
          POSTGRES_DB: kalm
          POSTGRES_USER: kalm
          POSTGRES_PASSWORD: kalm_dev_password
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U kalm -d kalm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302
      - name: Restore
        run: dotnet restore Kalm.slnx
      - name: NuGet vulnerability policy
        run: dotnet restore Kalm.slnx --force-evaluate -p:NuGetAudit=true -p:NuGetAuditMode=all -p:NuGetAuditLevel=high
      - name: Format
        run: dotnet format Kalm.slnx --verify-no-changes --no-restore
      - name: Build
        run: dotnet build Kalm.slnx --configuration Release --no-restore -m:1
      - name: Unit tests
        run: dotnet test tests/Unit/Kalm.UnitTests/Kalm.UnitTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
      - name: Architecture tests
        run: dotnet test tests/Architecture/Kalm.ArchitectureTests/Kalm.ArchitectureTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
      - name: Integration tests
        run: dotnet test tests/Integration/Kalm.Api.IntegrationTests/Kalm.Api.IntegrationTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
      - name: Validate clean database migration
        run: dotnet test tests/Integration/Kalm.Api.IntegrationTests/Kalm.Api.IntegrationTests.csproj --configuration Release --no-build --filter "FullyQualifiedName~PostgreSqlFoundationTests.InitialMigration_AppliesToCleanPostgreSqlDatabase"
      - name: Validate OpenAPI snapshot
        run: dotnet test tests/Integration/Kalm.Api.IntegrationTests/Kalm.Api.IntegrationTests.csproj --configuration Release --no-build --filter "FullyQualifiedName~OpenApiContractTests.OpenApiDocument_MatchesCommittedSnapshot"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npm exec playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run e2e

  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Scan committed content for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan PostgreSQL container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: postgres:18.4@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          # Debian's ssl-cert package creates this publicly known test key; keep secret scanning enabled elsewhere.
          skip-files: /etc/ssl/private/ssl-cert-snakeoil.key
          trivyignores: .trivyignore
